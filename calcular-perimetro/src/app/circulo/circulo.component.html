<ion-card line = "none">
  <ion-card-header>
    <ion-card-title>Circulo</ion-card-title>
    <ion-card-subtitle>Perimetro</ion-card-subtitle>
  </ion-card-header>
  <ion-card-content>
    El perimetro de un circulo es la longitud la linea que forma su borde.
  </ion-card-content>
  <img alt="circulo" src="https://www.decagono.com/img/circulo-formula-perimetro-radio.png" style="width: 200px; height: 200px;"/>
  <ion-card-content>
    <ion-list line="none">
      <ion-item>
        <ion-input [(ngModel)]="perimetroCirculoStr" type="number" label="Radio (cm)" label-placement="floating" fill="solid" placeholder="Ingrese Radio"></ion-input>
      </ion-item>
      <ion-item>
        <ion-button (click)="calcularElPerimetro()">Calcular el perimetro</ion-button>
      </ion-item>
      <ion-item>
        {{resultado}}
      </ion-item>
    </ion-list>
  </ion-card-content>
</ion-card>
